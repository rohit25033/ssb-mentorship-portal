<style>
  /* ============================================================
     SSB MENTORSHIP PORTAL — styles.html
     Aesthetic: Deep navy + teal — professional, modern, SSB-branded
  ============================================================ */

  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap');

  :root {
    --navy:      #0d1b2a;
    --navy-mid:  #1a2e45;
    --navy-card: #162338;
    --teal:      #00d4aa;
    --teal-dim:  #00a888;
    --teal-glow: rgba(0, 212, 170, 0.18);
    --amber:     #f6ad55;
    --red:       #fc4a6d;
    --text-main: #e8f0fe;
    --text-muted:#8fa8c4;
    --border:    rgba(0, 212, 170, 0.15);
    --card-bg:   rgba(22, 35, 56, 0.85);
    --radius:    14px;
    --radius-sm: 8px;
    --shadow:    0 8px 32px rgba(0,0,0,0.35);
    --shadow-sm: 0 2px 12px rgba(0,0,0,0.2);
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --trans:     0.22s cubic-bezier(0.4,0,0.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--navy);
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 60% 40% at 80% 10%, rgba(0,212,170,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 10% 80%, rgba(13,27,42,0.9) 0%, transparent 70%);
  }

  /* ── NAVBAR ── */
  #navbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(13,27,42,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 62px;
    display: flex; align-items: center; justify-content: space-between;
    transition: background var(--trans);
  }

  .navbar-brand {
    font-family: var(--font-head);
    font-size: 18px; font-weight: 800;
    color: var(--teal) !important;
    letter-spacing: -0.5px;
    text-decoration: none;
    display: flex; align-items: center; gap: 10px;
  }
  .navbar-brand span.brand-icon {
    width: 32px; height: 32px;
    background: var(--teal-glow);
    border: 1px solid var(--teal);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .nav-student-chip {
    display: flex; align-items: center; gap: 10px;
    background: var(--navy-card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 6px 14px;
    font-size: 13px; color: var(--text-muted);
  }
  .nav-student-chip .chip-name {
    font-weight: 600; color: var(--text-main); font-size: 13px;
  }
  .nav-dot {
    width: 8px; height: 8px;
    background: var(--teal); border-radius: 50%;
    box-shadow: 0 0 6px var(--teal);
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--teal); }
    50% { opacity: 0.6; box-shadow: 0 0 12px var(--teal); }
  }

  .nav-links {
    display: flex; align-items: center; gap: 4px;
  }
  .nav-link-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-family: var(--font-body);
    font-size: 13px; font-weight: 500;
    padding: 7px 14px; border-radius: 8px;
    transition: all var(--trans);
    display: flex; align-items: center; gap: 6px;
  }
  .nav-link-btn:hover, .nav-link-btn.active {
    color: var(--teal); background: var(--teal-glow);
  }
  .nav-link-btn.active { font-weight: 600; }

  /* ── PAGES ── */
  .page { display: none; padding-top: 80px; min-height: 100vh; }
  .page.active { display: block; animation: fadeUp 0.35s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .page-header {
    padding: 40px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  .page-header h1 {
    font-family: var(--font-head);
    font-size: 30px; font-weight: 800;
    color: var(--text-main);
    letter-spacing: -0.8px;
  }
  .page-header p {
    color: var(--text-muted); font-size: 15px; margin-top: 6px;
  }

  /* ── STAT CARDS ── */
  .stat-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    transition: all var(--trans);
    position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--teal), transparent);
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .stat-card:hover {
    border-color: rgba(0,212,170,0.4);
    box-shadow: 0 0 20px var(--teal-glow);
    transform: translateY(-2px);
  }
  .stat-number {
    font-family: var(--font-head);
    font-size: 40px; font-weight: 800;
    line-height: 1;
    color: var(--teal);
  }
  .stat-label {
    font-size: 13px; color: var(--text-muted); margin-top: 6px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .stat-icon {
    font-size: 28px; margin-bottom: 12px; display: block;
  }

  /* ── WELCOME BANNER ── */
  .welcome-banner {
    background: linear-gradient(135deg, var(--navy-card) 0%, rgba(0,212,170,0.08) 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
    margin-bottom: 28px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
  }
  .welcome-name {
    font-family: var(--font-head);
    font-size: 24px; font-weight: 800; color: var(--text-main);
  }
  .welcome-name em { color: var(--teal); font-style: normal; }
  .welcome-meta { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
  .welcome-meta span { color: var(--text-main); font-weight: 600; }

  /* ── TABLE ── */
  .ssb-table-wrap {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .ssb-table-wrap .table-title {
    padding: 18px 24px 0;
    font-family: var(--font-head);
    font-size: 16px; font-weight: 700;
    color: var(--text-main);
    display: flex; align-items: center; gap: 8px;
  }

  .ssb-table { width: 100%; border-collapse: collapse; }
  .ssb-table thead th {
    background: rgba(0,212,170,0.06);
    padding: 12px 16px;
    font-size: 11px; font-weight: 700;
    color: var(--teal);
    text-transform: uppercase; letter-spacing: 0.8px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .ssb-table tbody tr {
    border-bottom: 1px solid rgba(0,212,170,0.06);
    transition: background var(--trans);
  }
  .ssb-table tbody tr:last-child { border-bottom: none; }
  .ssb-table tbody tr:hover { background: rgba(0,212,170,0.04); }
  .ssb-table tbody td {
    padding: 14px 16px; font-size: 13.5px;
    color: var(--text-main); vertical-align: middle;
  }

  /* ── BADGES ── */
  .badge-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 50px;
    font-size: 11.5px; font-weight: 600;
  }
  .badge-done   { background: rgba(0,212,170,0.15); color: var(--teal); border: 1px solid rgba(0,212,170,0.3); }
  .badge-pend   { background: rgba(246,173,85,0.15); color: var(--amber); border: 1px solid rgba(246,173,85,0.3); }
  .badge-miss   { background: rgba(252,74,109,0.12); color: var(--red); border: 1px solid rgba(252,74,109,0.3); }
  .badge-info   { background: rgba(99,179,237,0.12); color: #63b3ed; border: 1px solid rgba(99,179,237,0.3); }

  /* ── MENTOR CARDS ── */
  .mentor-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }
  .mentor-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    transition: all var(--trans);
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }
  .mentor-card::after {
    content: '';
    position: absolute; top: 0; right: 0;
    width: 80px; height: 80px;
    background: radial-gradient(circle, var(--teal-glow) 0%, transparent 70%);
    border-radius: 0 var(--radius) 0 0;
    pointer-events: none;
  }
  .mentor-card:hover {
    border-color: rgba(0,212,170,0.45);
    box-shadow: var(--shadow);
    transform: translateY(-4px);
  }
  .mentor-photo {
    width: 64px; height: 64px; border-radius: 50%;
    object-fit: cover; border: 2px solid var(--teal);
    background: var(--navy-mid);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
  }
  .mentor-photo-wrap {
    display: flex; align-items: flex-start; gap: 16px; margin-bottom: 16px;
  }
  .mentor-name {
    font-family: var(--font-head);
    font-size: 17px; font-weight: 700; color: var(--text-main);
  }
  .mentor-role {
    font-size: 13px; color: var(--teal); font-weight: 500; margin-top: 2px;
  }
  .mentor-org {
    font-size: 12px; color: var(--text-muted); margin-top: 2px;
  }
  .mentor-divider {
    border: none; border-top: 1px solid var(--border); margin: 14px 0;
  }
  .mentor-meta-row {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px;
  }
  .mentor-meta-chip {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--text-muted);
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    padding: 3px 9px; border-radius: 50px;
  }
  .skills-wrap {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px;
  }
  .skill-tag {
    font-size: 11px; font-weight: 600;
    background: rgba(0,212,170,0.1); color: var(--teal);
    border: 1px solid rgba(0,212,170,0.25); border-radius: 4px;
    padding: 2px 8px;
  }
  .mentor-actions {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: auto; padding-top: 14px;
  }

  /* ── BUTTONS ── */
  .btn-teal {
    background: var(--teal); color: var(--navy);
    border: none; border-radius: var(--radius-sm);
    padding: 9px 18px; font-family: var(--font-body);
    font-size: 13.5px; font-weight: 700;
    cursor: pointer; transition: all var(--trans);
    display: inline-flex; align-items: center; gap: 7px;
    text-decoration: none; white-space: nowrap;
  }
  .btn-teal:hover {
    background: var(--teal-dim); transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(0,212,170,0.35);
    color: var(--navy);
  }
  .btn-teal:active { transform: translateY(0); }

  .btn-outline {
    background: transparent;
    border: 1px solid rgba(0,212,170,0.45);
    color: var(--teal); border-radius: var(--radius-sm);
    padding: 8px 16px; font-family: var(--font-body);
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all var(--trans);
    display: inline-flex; align-items: center; gap: 6px;
    text-decoration: none; white-space: nowrap;
  }
  .btn-outline:hover {
    background: var(--teal-glow);
    border-color: var(--teal);
    color: var(--teal);
  }

  .btn-ghost {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-muted); border-radius: var(--radius-sm);
    padding: 8px 14px; font-family: var(--font-body);
    font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all var(--trans);
    display: inline-flex; align-items: center; gap: 6px;
    text-decoration: none;
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.1); color: var(--text-main); }

  .btn-danger {
    background: rgba(252,74,109,0.12); border: 1px solid rgba(252,74,109,0.35);
    color: var(--red); border-radius: var(--radius-sm);
    padding: 9px 18px; font-family: var(--font-body);
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all var(--trans);
  }
  .btn-danger:hover { background: rgba(252,74,109,0.22); }

  .btn-sm { padding: 5px 12px !important; font-size: 12px !important; }
  .btn-full { width: 100%; justify-content: center; }

  /* ── MODALS ── */
  .ssb-modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 2000;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
    align-items: center; justify-content: center; padding: 20px;
  }
  .ssb-modal-overlay.open {
    display: flex; animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .ssb-modal {
    background: var(--navy-mid);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 32px;
    max-width: 540px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    position: relative;
    animation: slideUp 0.28s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .ssb-modal-close {
    position: absolute; top: 16px; right: 16px;
    background: rgba(255,255,255,0.08); border: none;
    color: var(--text-muted); width: 32px; height: 32px;
    border-radius: 50%; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--trans);
  }
  .ssb-modal-close:hover { background: rgba(252,74,109,0.2); color: var(--red); }
  .ssb-modal h2 {
    font-family: var(--font-head); font-size: 22px; font-weight: 800;
    color: var(--text-main); margin-bottom: 6px;
  }
  .ssb-modal .modal-sub {
    font-size: 14px; color: var(--text-muted); margin-bottom: 24px;
  }

  /* ── FORMS ── */
  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block; font-size: 13px; font-weight: 600;
    color: var(--text-muted); margin-bottom: 7px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .form-control {
    width: 100%; background: rgba(0,0,0,0.25);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text-main);
    font-family: var(--font-body); font-size: 14px;
    padding: 11px 14px;
    transition: border-color var(--trans), box-shadow var(--trans);
    outline: none;
  }
  .form-control:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(0,212,170,0.12);
  }
  .form-control::placeholder { color: rgba(143,168,196,0.5); }
  select.form-control option { background: var(--navy-mid); color: var(--text-main); }

  /* ── STAR RATING ── */
  .star-rating { display: flex; gap: 6px; }
  .star-btn {
    background: none; border: none; cursor: pointer;
    font-size: 26px; color: rgba(143,168,196,0.3);
    transition: all var(--trans); line-height: 1;
    padding: 2px;
  }
  .star-btn.active, .star-btn:hover { color: var(--amber); transform: scale(1.15); }

  /* ── FEEDBACK WARNING ── */
  .feedback-warning {
    background: rgba(246,173,85,0.08);
    border: 1px solid rgba(246,173,85,0.3);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex; align-items: flex-start; gap: 14px;
  }
  .feedback-warning-icon { font-size: 24px; flex-shrink: 0; }
  .feedback-warning-text h4 {
    font-family: var(--font-head); font-size: 15px; font-weight: 700;
    color: var(--amber); margin-bottom: 4px;
  }
  .feedback-warning-text p {
    font-size: 13px; color: var(--text-muted); line-height: 1.5;
  }

  /* ── ALERT ── */
  .ssb-alert {
    border-radius: var(--radius-sm);
    padding: 13px 16px; font-size: 13.5px;
    display: flex; align-items: flex-start; gap: 10px;
    margin-bottom: 16px;
  }
  .ssb-alert-danger {
    background: rgba(252,74,109,0.1);
    border: 1px solid rgba(252,74,109,0.3);
    color: var(--red);
  }
  .ssb-alert-success {
    background: rgba(0,212,170,0.1);
    border: 1px solid rgba(0,212,170,0.3);
    color: var(--teal);
  }
  .ssb-alert-info {
    background: rgba(99,179,237,0.1);
    border: 1px solid rgba(99,179,237,0.25);
    color: #63b3ed;
  }

  /* ── TOAST ── */
  #toast-container {
    position: fixed; bottom: 24px; right: 24px; z-index: 9999;
    display: flex; flex-direction: column; gap: 10px;
    pointer-events: none;
  }
  .toast-item {
    background: var(--navy-mid);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    min-width: 280px; max-width: 360px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: var(--shadow);
    animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: all; font-size: 14px;
  }
  .toast-item.removing { animation: toastOut 0.25s ease forwards; }
  @keyframes toastIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
  @keyframes toastOut { to { opacity:0; transform:translateX(20px); } }
  .toast-icon { font-size: 18px; flex-shrink: 0; }
  .toast-text { color: var(--text-main); font-weight: 500; }
  .toast-success .toast-icon { filter: none; }

  /* ── LOADING ── */
  #loading-overlay {
    position: fixed; inset: 0; z-index: 5000;
    background: var(--navy);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
  }
  #loading-overlay.hidden { display: none; }
  .loader-logo {
    font-family: var(--font-head); font-size: 26px; font-weight: 800;
    color: var(--teal); letter-spacing: -0.5px;
  }
  .loader-ring {
    width: 48px; height: 48px; border-radius: 50%;
    border: 3px solid rgba(0,212,170,0.15);
    border-top-color: var(--teal);
    animation: spin 0.85s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { font-size: 14px; color: var(--text-muted); }

  /* ── ACCESS DENIED ── */
  #access-denied {
    display: none; position: fixed; inset: 0; z-index: 4000;
    background: var(--navy);
    align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; text-align: center; padding: 40px;
  }
  #access-denied.open { display: flex; }
  .denied-icon { font-size: 64px; animation: shake 0.5s ease; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 60%{transform:translateX(10px)}
  }
  #access-denied h2 {
    font-family: var(--font-head); font-size: 28px; font-weight: 800; color: var(--red);
  }
  #access-denied p { font-size: 15px; color: var(--text-muted); max-width: 420px; line-height: 1.6; }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative; max-width: 360px;
  }
  .search-wrap input {
    padding-left: 40px !important;
  }
  .search-icon {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 16px; pointer-events: none;
  }

  /* ── MEET LINK ── */
  .meet-link {
    color: var(--teal); text-decoration: none; font-weight: 600;
    display: inline-flex; align-items: center; gap: 5px;
    transition: color var(--trans);
  }
  .meet-link:hover { color: var(--teal-dim); text-decoration: underline; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: rgba(0,212,170,0.25); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,212,170,0.45); }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    #navbar { padding: 0 16px; }
    .nav-links { display: none; }
    .mobile-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(13,27,42,0.97); backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-around; padding: 10px 0;
    }
    .mobile-nav-btn {
      background: none; border: none; color: var(--text-muted);
      font-size: 11px; font-weight: 600; font-family: var(--font-body);
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 4px 10px; cursor: pointer; transition: color var(--trans);
    }
    .mobile-nav-btn .icon { font-size: 20px; }
